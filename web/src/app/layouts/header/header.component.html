<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 shadow-sm">
  <div class="flex items-center gap-4">
    <button
      (click)="toggleMenu()"
      class="p-2 rounded-md hover:bg-gray-100 transition-colors text-gray-600 focus:outline-none"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <span class="text-xl font-bold text-indigo-600 tracking-tight">
      DjangoAdmin<span class="text-gray-900">Template</span>
    </span>
  </div>

  <div class="flex items-center gap-2">
    <button
      [matMenuTriggerFor]="userMenu"
      class="flex items-center gap-3 p-1.5 rounded-lg hover:bg-gray-50 transition-all group focus:outline-none"
    >
      <div class="hidden sm:flex flex-col items-end leading-tight text-right">
        <span class="text-sm font-semibold text-gray-900">
          {{ user()?.first_name || 'Usuário' }}
        </span>
        <span class="text-[10px] text-gray-500 font-medium uppercase tracking-wider">
          Administrador
        </span>
      </div>

      <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold shadow-sm group-hover:ring-4 group-hover:ring-indigo-50 transition-all">
        {{ user()?.first_name?.charAt(0) || 'U' }}
      </div>
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before" class="!mt-2 !rounded-xl !border !border-gray-100 !shadow-lg">
      <div class="px-4 py-3 border-b border-gray-50">
        <p class="text-sm font-semibold text-gray-900">{{ user()?.first_name }} {{ user()?.last_name }}</p>
        <p class="text-xs text-gray-500 truncate">{{ user()?.email }}</p>
      </div>

      <button mat-menu-item class="!text-sm !text-gray-600 group">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-gray-400 group-hover:text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span>Meu Perfil</span>
        </div>
      </button>

      <button mat-menu-item (click)="handleLogout()" class="!text-sm !text-red-600 font-medium group">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-red-400 group-hover:text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span>Sair do Sistema</span>
        </div>
      </button>
    </mat-menu>
  </div>
</header>
