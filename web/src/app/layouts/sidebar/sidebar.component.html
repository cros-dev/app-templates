<nav class="flex flex-col h-full py-6 overflow-y-auto bg-white">
  <div class="px-6 mb-4">
    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
      Menu Principal
    </p>
  </div>

  <div class="flex-1 px-3 space-y-1">
    @for (item of menuItems; track item.label) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-indigo-50 text-indigo-700"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 hover:text-indigo-600 transition-all duration-200 group"
      >
        <svg
          class="w-5 h-5 text-gray-400 group-hover:text-indigo-600 transition-colors"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            [attr.d]="item.iconPath"
          />
        </svg>

        <span>{{ item.label }}</span>
      </a>
    }
  </div>

  <div class="mt-auto px-6 py-4 border-t border-gray-100 bg-gray-50/50">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
      <div class="flex-1 min-w-0">
        <p class="text-[10px] font-semibold text-gray-500 uppercase">Sistema Online</p>
        <p class="text-[9px] text-gray-400 font-mono truncate">v1.0.0-stable</p>
      </div>
    </div>
  </div>
</nav>
